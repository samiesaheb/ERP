[build]
  builder = "nixpacks"

[[services]]
  name = "api"
  source = "api/"
  [services.build]
    buildCommand = "cargo build --release --package skyhigh-api"
    startCommand = "./target/release/skyhigh-api"
    [services.build.env]
      SQLX_OFFLINE = "true"
  [services.deploy]
    healthcheckPath = "/health"

[[services]]
  name = "web"
  source = "web/"
  [services.build]
    buildCommand = "npm run build"
    startCommand = "npm run start"
